name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Ansible
        run: python -m pip install ansible-core
      - name: Syntax check
        run: ansible-playbook --syntax-check playbook.yml
